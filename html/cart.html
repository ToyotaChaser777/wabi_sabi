<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/styles.css">
    <link rel="stylesheet" href="../styles/cart.css">
    <title>WABI-SABI — Корзина</title>
</head>
<body>
    <header>
        <a href="index.html" class="logo" style="text-decoration: none; color: inherit;">
            <img src="../img/logo.png" alt="WABI-SABI Logo" class="logo_img">
            <h1>WABI-SABI</h1>
        </a>
        <div class="user-panel">
            <div class="panel">
                <img src="../img/profile.png" alt="profile" class="panel-icon">
                <a href="#" id="user-link" class="panel-links">Войти</a>
            </div>
            <div class="panel cart-panel">
                <div class="cart-icon-wrapper">
                    <img src="../img/cart.png" alt="Корзина" class="cart-icon">
                    <span class="cart-count">0</span>
                </div>
                <a href="cart.html" class="panel-links">Корзина</a>
            </div>
        </div>
    </header>
    <div class="modal" id="auth-modal">
        <div class="modal-content">
            <span class="close-modal" id="close-modal">×</span>
            <h2 id="modal-title">Вход в аккаунт</h2>
            <div class="modal-tabs">
                <button class="tab-btn active" data-tab="login">Войти</button>
                <button class="tab-btn" data-tab="register">Регистрация</button>
            </div>
            <form id="login-form" class="auth-form">
                <input type="email" id="login-email" placeholder="Email" required>
                <input type="password" id="login-password" placeholder="Пароль" required>
                <button type="submit">Войти</button>
            </form>
            <form id="register-form" class="auth-form hidden">
                <input type="text" id="reg-name" placeholder="Имя" required>
                <input type="email" id="reg-email" placeholder="Email" required>
                <input type="tel" id="reg-phone" placeholder="Телефон">
                <input type="password" id="reg-password" placeholder="Пароль" required>
                <button type="submit">Зарегистрироваться</button>
            </form>
        </div>
    </div>
    <main class="cart-page">
        <div class="cart-container">
            <h1>Корзина</h1>
            <div id="cart-items" class="cart-items"></div>
            <div class="cart-summary">
                <div class="summary-row">
                    <span>Сумма товаров:</span>
                    <span id="total-amount">0 ₸</span>
                </div>
                <div class="summary-row">
                    <span>Доставка:</span>
                    <span>Бесплатно</span>
                </div>
                <div class="summary-row total">
                    <span>Итого к оплате:</span>
                    <span id="final-total">0 ₸</span>
                </div>
                <button id="checkout-btn" class="checkout-btn">Оформить заказ</button>
            </div>
        </div>
    </main>
    <script src="../js/auth.js"></script>
    <script src="../js/cart.js"></script>
</body>
</html>
